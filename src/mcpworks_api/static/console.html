<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mcpworks console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<style>
@property --border-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

:root {
  --bg-0: #030712;
  --bg-1: #111827;
  --bg-2: #1f2937;
  --bg-3: #374151;
  --border-1: #1f2937;
  --border-2: #374151;
  --text-1: #ffffff;
  --text-2: #9ca3af;
  --text-3: #6b7280;
  --accent: #2563eb;
  --accent-sub: rgba(37, 99, 235, 0.10);
  --accent-glow: rgba(37, 99, 235, 0.06);
  --link: #60a5fa;
  --danger: #f87171;
  --warn: #fbbf24;
  --green: #4ade80;
  --radius: 10px;
  --sans: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --body: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
  --mono: ui-monospace, 'Cascadia Code', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-0);
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 40px 40px;
  color: var(--text-1);
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

::selection { background: var(--accent-sub); color: var(--accent); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-2); }

#app { max-width: 1080px; margin: 0 auto; padding: 24px 20px; }

header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }

.logo { font-family: var(--sans); font-size: 17px; font-weight: 700; color: var(--text-1); letter-spacing: -0.02em; }
.logo-accent { color: #3b82f6; }
.logo-cursor { display: inline-block; width: 2px; height: 16px; background: var(--accent); margin-left: 3px; vertical-align: text-bottom; animation: blink 1.2s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

.user-bar { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.user-email { color: var(--text-2); }
.tier-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: var(--sans); text-transform: uppercase; letter-spacing: 0.04em; }
.tier-free { background: var(--bg-3); color: var(--text-2); }
.tier-founder { background: rgba(37, 99, 235, 0.15); color: var(--link); }
.tier-founder_pro { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }
.tier-enterprise { background: rgba(255, 200, 87, 0.15); color: var(--warn); }

.card { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--radius); }
.card:hover { border-color: var(--border-2); }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--body); font-size: 13px; font-weight: 500; transition: all 0.15s ease; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1d4ed8; box-shadow: 0 0 20px var(--accent-sub); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-danger { background: rgba(255, 107, 107, 0.12); color: var(--danger); border: 1px solid rgba(255, 107, 107, 0.2); }
.btn-danger:hover { background: rgba(255, 107, 107, 0.2); }
.btn-ghost { background: transparent; border: 1px solid var(--border-1); color: var(--text-2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--text-1); }
.btn-copy { background: var(--bg-3); color: var(--text-2); border: 1px solid var(--border-1); }
.btn-copy:hover { color: var(--text-1); border-color: var(--border-2); }
.btn-copy.copied { color: var(--accent); border-color: var(--accent); }
.btn-block { width: 100%; justify-content: center; }

input { display: block; width: 100%; background: var(--bg-0); border: 1px solid var(--border-1); color: var(--text-1); padding: 10px 14px; border-radius: 8px; font-family: var(--body); font-size: 13px; outline: none; transition: border-color 0.15s ease; }
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-sub); }
input::placeholder { color: var(--text-3); }

.login-wrapper { display: flex; justify-content: center; padding-top: 80px; }
.login-card { width: 380px; padding: 32px; border-radius: 14px; background: linear-gradient(var(--bg-1), var(--bg-1)) padding-box, conic-gradient(from var(--border-angle), #3b82f6, var(--border-1) 40%, #3b82f6) border-box; border: 1px solid transparent; animation: cardEnter 0.5s ease-out, rotateBorder 8s linear infinite; }
@keyframes cardEnter { from { opacity: 0; transform: scale(0.96) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes rotateBorder { to { --border-angle: 360deg; } }
.login-card h2 { font-family: var(--sans); font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text-1); }
.login-card input { margin-bottom: 12px; }
.login-card .btn { margin-top: 4px; }
.error-msg { color: var(--danger); font-size: 13px; margin-bottom: 12px; padding: 8px 12px; background: rgba(255, 107, 107, 0.08); border-radius: 6px; border: 1px solid rgba(255, 107, 107, 0.15); }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 12px; }
@media (max-width: 700px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

.insights-drawer { margin-bottom: 14px; }
.insights-header { display: flex; align-items: center; padding: 0 14px; height: 36px; background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--radius); cursor: pointer; user-select: none; gap: 6px; transition: border-color 0.15s; }
.insights-header:hover { border-color: var(--border-2); }
.insights-chevron { flex-shrink: 0; color: var(--text-3); transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), color 0.15s; }
.insights-header:hover .insights-chevron { color: var(--text-2); }
.insights-drawer.open .insights-chevron { transform: rotate(90deg); }
.insights-label { font-family: var(--sans); font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; transition: color 0.15s; }
.insights-header:hover .insights-label { color: var(--text-2); }
.insights-body { display: grid; grid-template-rows: 1fr; transition: grid-template-rows 0.28s cubic-bezier(0.4, 0, 0.2, 1); }
.insights-drawer:not(.open) .insights-body { grid-template-rows: 0fr; }
.insights-body-inner { overflow: hidden; }
.insights-content { padding: 14px; background: var(--bg-1); border: 1px solid var(--border-1); border-top: none; border-radius: 0 0 var(--radius) var(--radius); }
.insights-drawer.open .insights-header { border-radius: var(--radius) var(--radius) 0 0; }

.stat-card { position: relative; background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--radius); padding: 18px 16px 14px; text-align: center; cursor: pointer; transition: all 0.2s ease; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); opacity: 0; transition: opacity 0.2s ease; }
.stat-card:hover { border-color: var(--border-2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.stat-card:hover::before { opacity: 1; }
.stat-num { font-size: 30px; font-weight: 700; color: #fff; font-family: var(--sans); letter-spacing: -0.02em; line-height: 1.2; }
.stat-label { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--sans); font-weight: 600; margin-top: 2px; transition: color 0.15s; }
.stat-card:hover .stat-label { color: var(--link); text-decoration: underline; text-underline-offset: 3px; }

.usage-strip { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: 8px; padding: 10px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-2); }
.usage-track { flex: 1; height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
.usage-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
.usage-fill.warn { background: var(--warn); }
.usage-fill.danger { background: var(--danger); }
.usage-text { white-space: nowrap; font-family: var(--mono); font-size: 12px; }
.usage-tier { font-family: var(--sans); }

.breadcrumb { font-size: 13px; color: var(--text-3); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; min-height: 20px; }
.breadcrumb a { color: var(--link); text-decoration: none; transition: color 0.1s; }
.breadcrumb a:hover { color: #8dd4ff; text-decoration: underline; }
.breadcrumb .sep { color: var(--border-2); margin: 0 2px; }
.breadcrumb .current { color: var(--text-2); }

.content-card { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--radius); min-height: 200px; animation: fadeUp 0.25s ease-out; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 16px; color: var(--text-3); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--sans); border-bottom: 1px solid var(--border-1); background: var(--bg-0); }
th:first-child { border-radius: var(--radius) 0 0 0; }
th:last-child { border-radius: 0 var(--radius) 0 0; }
td { padding: 10px 16px; border-bottom: 1px solid rgba(31, 41, 55, 0.5); font-size: 13px; font-family: var(--mono); transition: background 0.1s; }
tr:last-child td { border-bottom: none; }
tr.clickable { cursor: pointer; }
tr.clickable:hover td { background: var(--bg-2); }
tr.clickable:hover td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
.cell-name { color: var(--link); font-weight: 500; }
.cell-dim { color: var(--text-2); }
.cell-muted { color: var(--text-3); font-size: 12px; }

.stagger { animation: rowSlide 0.25s ease-out both; animation-delay: calc(var(--i) * 30ms); }
@keyframes rowSlide { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

.tag { display: inline-block; padding: 2px 8px; background: var(--bg-3); border-radius: 4px; font-size: 11px; color: var(--text-2); margin-right: 4px; }

.status-active, .status-completed { color: var(--green); }
.status-failed, .status-suspended { color: var(--danger); }
.status-running { color: var(--warn); }
.status-pending { color: var(--text-3); }

pre.code-block { background: var(--bg-0); border: 1px solid var(--border-1); border-radius: 8px; padding: 0; overflow-x: auto; font-family: var(--mono); font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; color: var(--text-2); }
pre.code-block code.hljs { background: var(--bg-0); padding: 16px; border-radius: 8px; font-family: var(--mono); font-size: 13px; line-height: 1.7; }
.schema-block { background: var(--bg-0); border: 1px solid var(--border-1); border-radius: 8px; padding: 0; font-family: var(--mono); font-size: 12px; overflow-x: auto; white-space: pre-wrap; color: var(--text-2); }
.schema-block code.hljs { background: var(--bg-0); padding: 14px; border-radius: 8px; font-family: var(--mono); font-size: 12px; }

.key-reveal { background: rgba(0, 223, 162, 0.06); border: 1px solid rgba(0, 223, 162, 0.2); border-radius: 8px; padding: 14px; margin-bottom: 16px; animation: fadeUp 0.3s ease-out; }
.key-reveal-label { color: var(--accent); font-size: 13px; font-weight: 500; font-family: var(--sans); margin-bottom: 8px; }
.key-reveal-row { display: flex; align-items: center; gap: 10px; }
.key-reveal-row code { flex: 1; font-size: 13px; color: var(--text-1); word-break: break-all; }

.detail-section { padding: 24px; }
.detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.detail-title { font-family: var(--sans); font-size: 18px; font-weight: 700; color: #fff; }
.detail-version { font-size: 12px; color: var(--text-3); background: var(--bg-3); padding: 3px 8px; border-radius: 4px; }
.detail-desc { color: var(--text-2); font-size: 13px; margin-bottom: 14px; }
.detail-meta { font-size: 12px; color: var(--text-3); margin-bottom: 4px; }
.detail-meta span { color: var(--text-2); }
.section-label { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 8px; margin-top: 20px; text-transform: uppercase; letter-spacing: 0.04em; }

.empty { text-align: center; padding: 56px 24px; }
.empty-icon { font-size: 28px; color: var(--text-3); margin-bottom: 10px; font-family: var(--mono); opacity: 0.6; }
.empty-text { color: var(--text-2); font-size: 14px; font-family: var(--sans); margin-bottom: 4px; }
.empty-hint { color: var(--text-3); font-size: 12px; }

.loading { padding: 24px; color: var(--text-3); display: flex; align-items: center; gap: 10px; font-size: 13px; }
.loader { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border-2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }

.inline-form { display: flex; align-items: flex-end; gap: 10px; background: var(--bg-0); border: 1px solid var(--border-1); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
.inline-form .field { flex: 1; }
.inline-form label { display: block; font-size: 11px; color: var(--text-3); margin-bottom: 4px; font-family: var(--sans); text-transform: uppercase; letter-spacing: 0.04em; }
.inline-form input { margin-bottom: 0; }

.endpoint-url { font-size: 12px; font-family: var(--mono); color: var(--text-3); background: var(--bg-0); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border-1); }

.version-clickable { cursor: pointer; }
.version-clickable:hover td { background: var(--bg-2); }
.version-clickable.selected td { background: rgba(37, 99, 235, 0.08); }

.diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
.diff-panel { background: var(--bg-0); border: 1px solid var(--border-1); border-radius: 8px; padding: 14px; overflow-x: auto; font-family: var(--mono); font-size: 12px; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; }
.diff-panel-label { font-family: var(--sans); font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.diff-line { display: flex; }
.diff-line-num { display: inline-block; width: 32px; flex-shrink: 0; text-align: right; padding-right: 10px; color: var(--text-3); opacity: 0.5; user-select: none; }
.diff-line-text { flex: 1; min-width: 0; }
.diff-line-add { background: rgba(74, 222, 128, 0.10); color: var(--green); }
.diff-line-add .diff-line-num { color: var(--green); opacity: 0.5; }
.diff-line-remove { background: rgba(248, 113, 113, 0.10); color: var(--danger); }
.diff-line-remove .diff-line-num { color: var(--danger); opacity: 0.5; }
.diff-line-same { color: var(--text-3); }
.diff-section-title { font-family: var(--sans); font-size: 12px; font-weight: 600; color: var(--text-2); margin-top: 16px; margin-bottom: 6px; }
.diff-section-title:first-child { margin-top: 0; }
.diff-empty { color: var(--text-3); font-style: italic; font-size: 12px; }

.version-hint { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: var(--bg-3); color: var(--text-3); font-size: 10px; font-weight: 700; font-family: var(--sans); cursor: help; vertical-align: middle; }
.version-hint:hover { color: var(--text-1); background: var(--border-2); }
.version-hint .hint-popup { display: none; position: absolute; top: calc(100% + 8px); right: -8px; width: 280px; padding: 12px 14px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 8px; font-size: 12px; font-weight: 400; line-height: 1.6; color: var(--text-2); z-index: 10; box-shadow: 0 8px 24px rgba(0,0,0,0.4); white-space: normal; }
.version-hint:hover .hint-popup { display: block; }

.pie-wrap { display: flex; align-items: center; gap: 20px; padding: 14px 0 6px; }
.pie-wrap svg { flex-shrink: 0; }
.pie-seg { transition: opacity 0.15s; cursor: default; }
.pie-seg:hover { opacity: 0.7; filter: brightness(1.15); }
.pie-legend { display: flex; flex-wrap: wrap; gap: 4px 18px; }
.pie-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.pie-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.pie-label { color: var(--text-2); font-family: var(--mono); }
.pie-label.clickable { color: var(--link); cursor: pointer; transition: color 0.1s; }
.pie-label.clickable:hover { color: #8dd4ff; text-decoration: underline; }
.pie-val { color: var(--text-3); font-family: var(--mono); font-size: 11px; }
.pie-empty-state { display: flex; align-items: center; gap: 12px; padding: 14px 0 6px; color: var(--text-3); font-size: 12px; font-family: var(--sans); }
</style>
</head>
<body>

<div id="app">

  <header>
    <div class="logo">mcpworks <span class="logo-accent">console</span><span class="logo-cursor"></span></div>
    <div id="user-info" class="user-bar hidden">
      <span id="tier-badge" class="tier-badge hidden"></span>
      <span id="user-email" class="user-email"></span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">logout</button>
    </div>
  </header>

  <div id="login-section">
    <div class="login-wrapper">
      <div class="login-card">
        <h2>Sign in</h2>
        <div id="login-error" class="error-msg hidden"></div>
        <a href="/v1/auth/oauth/google/login?redirect_uri=/console" class="btn btn-block" style="background:#fff;color:#111;gap:8px;margin-bottom:8px;text-decoration:none;">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </a>
        <a href="/v1/auth/oauth/github/login?redirect_uri=/console" class="btn btn-block" style="background:var(--bg-3);gap:8px;margin-bottom:12px;text-decoration:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          Sign in with GitHub
        </a>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><div style="flex:1;border-top:1px solid var(--border-2)"></div><span style="color:var(--text-3);font-size:12px;">or</span><div style="flex:1;border-top:1px solid var(--border-2)"></div></div>
        <input id="login-email" type="email" placeholder="Email">
        <input id="login-password" type="password" placeholder="Password">
        <button class="btn btn-primary btn-block" onclick="doLogin()">Login</button>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden">

    <div class="stats-grid">

      </div>

        <div class="stat-num" id="stat-services">&mdash;</div>
        <div class="stat-label">Services</div>
      </div>

        <div class="stat-num" id="stat-functions">&mdash;</div>
        <div class="stat-label">Functions</div>
      </div>

        <div class="stat-num" id="stat-keys">&mdash;</div>
        <div class="stat-label">API Keys</div>
      </div>

        <span class="insights-label">Insights</span>

</div>

<script>
let TOKEN = localStorage.getItem('mcpworks_token');
let USER_EMAIL = localStorage.getItem('mcpworks_email');
const API = window.location.origin;

let cachedNamespaces = [];
let pendingKeyBanner = null;

function toggleInsights() {
  const d = document.getElementById('insights-drawer');
  d.classList.toggle('open');
  localStorage.setItem('mcpworks_insights_open', d.classList.contains('open') ? '1' : '0');
}

function setInsights(html) {
  const d = document.getElementById('insights-drawer');
  const c = document.getElementById('insights-content');
  if (!html) { d.classList.add('hidden'); d.classList.remove('open'); return; }
  c.innerHTML = html;
  d.classList.remove('hidden');
  const saved = localStorage.getItem('mcpworks_insights_open');
  if (saved !== '0') d.classList.add('open');
  else d.classList.remove('open');
}

(function handleOAuthReturn() {
  if (!window.location.hash) return false;
  const hp = new URLSearchParams(window.location.hash.substring(1));
  const ht = hp.get('access_token');
  if (!ht) return false;
  TOKEN = ht;
  localStorage.setItem('mcpworks_token', ht);
  history.replaceState(null, '', window.location.pathname);
  fetch(`${API}/v1/users/me`, { headers: { 'Authorization': `Bearer ${ht}` } })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(u => { USER_EMAIL = u.email; localStorage.setItem('mcpworks_email', u.email); showDashboard(u.email); })
    .catch(() => showDashboard(''));
  return true;
})() || (TOKEN && USER_EMAIL && showDashboard(USER_EMAIL));

function showDashboard(email) {
  document.getElementById('login-section').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('user-info').classList.remove('hidden');
  document.getElementById('user-email').textContent = email;
  loadStats();
  loadNamespaces();
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  try {
    const res = await fetch(`${API}/v1/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.detail?.message || data.detail || 'Login failed');
    }
    const data = await res.json();
    TOKEN = data.access_token;
    USER_EMAIL = email;
    localStorage.setItem('mcpworks_token', TOKEN);
    localStorage.setItem('mcpworks_email', email);
    showDashboard(email);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

function doLogout() {
  TOKEN = null;
  USER_EMAIL = null;
  localStorage.removeItem('mcpworks_token');
  localStorage.removeItem('mcpworks_email');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('user-info').classList.add('hidden');
  document.getElementById('usage-strip').classList.add('hidden');
  document.getElementById('login-section').classList.remove('hidden');
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').classList.add('hidden');
}

document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-password').focus(); });

async function apiFetch(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: { 'Authorization': `Bearer ${TOKEN}`, ...(opts.headers || {}) },
  });
  if (res.status === 401 || res.status === 403) {
    doLogout();
    document.getElementById('login-error').textContent = 'Session expired';
    document.getElementById('login-error').classList.remove('hidden');
    throw new Error('Unauthorized');
  }
  if (res.status === 204) return null;
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

function countUp(el, target, duration) {
  duration = duration || 500;
  if (isNaN(target)) { el.textContent = target; return; }
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(target * eased);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

async function loadStats() {
  try {
    const [nsData, usageData, profile, keysData] = await Promise.all([
      apiFetch('/v1/namespaces?page=1&page_size=100'),
      apiFetch('/v1/account/usage'),
      apiFetch('/v1/users/me'),
      apiFetch('/v1/users/me/api-keys'),
    ]);

    cachedNamespaces = nsData.namespaces || [];
    countUp(document.getElementById('stat-namespaces'), nsData.total);
    countUp(document.getElementById('stat-keys'), (keysData.items || []).length);

    if (profile.tier) {
      const badge = document.getElementById('tier-badge');
      badge.textContent = profile.tier.replace('_', ' ');
      badge.className = 'tier-badge tier-' + profile.tier;
      badge.classList.remove('hidden');
    }

    const strip = document.getElementById('usage-strip');
    const isUnlimited = usageData.executions_limit === -1;
    const used = usageData.executions_count;
    const limit = usageData.executions_limit;
    document.getElementById('usage-text').textContent = isUnlimited ? `${used} executions` : `${used} / ${limit}`;
    document.getElementById('usage-tier').textContent = usageData.tier.replace('_', ' ');
    const fill = document.getElementById('usage-fill');
    const pct = isUnlimited ? 0 : Math.min((used / limit) * 100, 100);
    fill.style.width = '0%';
    strip.classList.remove('hidden');
    requestAnimationFrame(() => { fill.style.width = pct + '%'; });
    fill.classList.remove('warn', 'danger');
    if (pct > 80) fill.classList.add('danger');
    else if (pct > 50) fill.classList.add('warn');

    let totalServices = 0, totalFunctions = 0;
    const svcResults = await Promise.all(
      cachedNamespaces.map(ns =>
        apiFetch(`/v1/namespaces/${encodeURIComponent(ns.name)}/services`).catch(() => ({ services: [] }))
      )
    );
    for (const r of svcResults) {
      const svcs = r.services || [];
      totalServices += svcs.length;
      for (const s of svcs) totalFunctions += s.function_count || 0;
    }
    countUp(document.getElementById('stat-services'), totalServices);
    countUp(document.getElementById('stat-functions'), totalFunctions);
  } catch (e) { console.error('Stats failed', e); }
}

function setBreadcrumb(parts) {
  document.getElementById('breadcrumb').innerHTML = parts.map((p, i) => {
    if (i < parts.length - 1 && p.onclick) return `<a href="#" onclick="${p.onclick}; return false;">${p.label}</a><span class="sep">/</span>`;
    return `<span class="current">${p.label}</span>`;
  }).join('');
}

function emptyState(icon, text, hint) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${text}</div>${hint ? `<div class="empty-hint">${hint}</div>` : ''}</div>`;
}

const PIE_COLORS = ['#3b82f6','#8b5cf6','#06b6d4','#f59e0b','#10b981','#f97316','#ec4899','#ef4444'];

function renderPieChart(items, labelKey, valueKey, onClickFn) {
  const total = items.reduce((s, d) => s + (d[valueKey] || 0), 0);
  if (total === 0) {
    return `<div class="pie-empty-state"><svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="18" fill="none" stroke="var(--border-1)" stroke-width="6"/></svg><span>No calls yet</span></div>`;
  }
  const R = 28, CX = 40, CY = 40, SW = 10;
  const C = 2 * Math.PI * R;
  let off = 0;
  const segs = [], leg = [];
  items.forEach((item, i) => {
    const v = item[valueKey] || 0;
    if (!v) return;
    const pct = v / total;
    const dash = pct * C;
    const col = PIE_COLORS[i % PIE_COLORS.length];
    segs.push(`<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${col}" stroke-width="${SW}" stroke-dasharray="${dash.toFixed(2)} ${(C - dash).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${CX} ${CY})" class="pie-seg"/>`);
    off += dash;
    const p = Math.round(pct * 100);
    const labelHtml = onClickFn
      ? `<span class="pie-label clickable" onclick="${onClickFn(item)}">${esc(item[labelKey])}</span>`
      : `<span class="pie-label">${esc(item[labelKey])}</span>`;
    leg.push(`<div class="pie-legend-item"><span class="pie-dot" style="background:${col}"></span>${labelHtml}<span class="pie-val">${v} (${p}%)</span></div>`);
  });
  return `<div class="pie-wrap"><svg width="80" height="80" viewBox="0 0 80 80">${segs.join('')}<text x="${CX}" y="${CY}" text-anchor="middle" dominant-baseline="central" fill="var(--text-1)" font-family="var(--sans)" font-size="13" font-weight="700">${total}</text></svg><div class="pie-legend">${leg.join('')}</div></div>`;
}

    c.innerHTML = `<table><thead><tr><th>Namespace</th><th>Description</th><th>Calls</th><th>Created</th></tr></thead><tbody>${ns.map((n, i) => `
      <tr class="clickable stagger" style="--i:${i}" onclick="loadNamespace('${esc(n.name)}')">

async function loadApiKeys() {
  const c = document.getElementById('content');

  setBreadcrumb([{ label: 'API Keys' }]);
  setInsights(null);

    const banner = pendingKeyBanner ? `<div class="key-reveal">
      <div class="key-reveal-label">API key created &mdash; copy it now, it won't be shown again</div>
      <div class="key-reveal-row"><code>${esc(pendingKeyBanner)}</code><button class="btn btn-copy btn-sm" onclick="copyText('${esc(pendingKeyBanner)}',this)">copy</button></div>
    </div>` : '';
    pendingKeyBanner = null;
    c.innerHTML = `<div class="detail-section">
      <div class="detail-header"><div class="detail-title">API Keys</div><button class="btn btn-primary btn-sm" onclick="showCreateKeyForm()">Create Key</button></div>
      <div id="key-create-area"></div>
      <div id="key-banner">${banner}</div>
      ${!keys.length ? emptyState('&bull;&bull;&bull;', 'No API keys', 'Create one to authenticate via the REST API or MCP')
      : `<table><thead><tr><th>Name</th><th>Prefix</th><th>Namespace</th><th>Scopes</th><th>Created</th><th>Last Used</th><th>Expires</th><th></th></tr></thead><tbody>${keys.map((k, i) => `
        <tr class="stagger" style="--i:${i}">
          <td class="cell-dim">${esc(k.name || '\u2014')}</td>
          <td><code style="color:var(--text-2)">${esc(k.key_prefix)}&hellip;</code></td>
          <td class="cell-dim">${k.namespace_name ? esc(k.namespace_name) : '<span style="color:var(--text-3)">all</span>'}</td>
          <td>${(k.scopes || []).map(s => `<span class="tag">${esc(s)}</span>`).join('')}</td>
          <td class="cell-muted">${fmtDate(k.created_at)}</td>
          <td class="cell-muted">${fmtDate(k.last_used_at)}</td>
          <td class="cell-muted">${k.expires_at ? fmtDate(k.expires_at) : 'never'}</td>
          <td><button class="btn btn-danger btn-sm" onclick="revokeKey('${esc(k.id)}')">revoke</button></td>
        </tr>`).join('')}</tbody></table>`}
    </div>`;
  } catch (e) { c.innerHTML = `<div class="loading" style="color:var(--danger)">${esc(e.message)}</div>`; }
}

function showCreateKeyForm() {
  const area = document.getElementById('key-create-area');
  const nsOptions = cachedNamespaces.map(ns => `<option value="${esc(ns.id)}">${esc(ns.name)}</option>`).join('');
  area.innerHTML = `<div style="background:var(--bg-0);border:1px solid var(--border-1);border-radius:8px;padding:14px;margin-bottom:16px">
    <div style="display:flex;gap:10px;margin-bottom:10px">
      <div style="flex:1"><label style="display:block;font-size:11px;color:var(--text-3);margin-bottom:4px;font-family:var(--sans);text-transform:uppercase;letter-spacing:0.04em">Key Name</label><input id="new-key-name" type="text" placeholder="e.g. my-cli-key"></div>
      <div style="flex:1"><label style="display:block;font-size:11px;color:var(--text-3);margin-bottom:4px;font-family:var(--sans);text-transform:uppercase;letter-spacing:0.04em">Namespace</label><select id="new-key-namespace" style="display:block;width:100%;background:var(--bg-0);border:1px solid var(--border-1);color:var(--text-1);padding:10px 14px;border-radius:8px;font-family:var(--body);font-size:13px;outline:none"><option value="">All namespaces</option>${nsOptions}</select></div>
    </div>
    <div style="margin-bottom:12px"><label style="display:block;font-size:11px;color:var(--text-3);margin-bottom:6px;font-family:var(--sans);text-transform:uppercase;letter-spacing:0.04em">Scopes</label>
      <div style="display:flex;gap:14px">
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);cursor:pointer"><input type="checkbox" id="scope-read" checked> read</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);cursor:pointer"><input type="checkbox" id="scope-write" checked> write</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);cursor:pointer"><input type="checkbox" id="scope-execute" checked> execute</label>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="createKey()">Create</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('key-create-area').innerHTML=''">Cancel</button>
    </div>
  </div>`;
  document.getElementById('new-key-name').focus();
  document.getElementById('new-key-name').addEventListener('keydown', e => { if (e.key === 'Enter') createKey(); });
}

async function createKey() {
  const name = document.getElementById('new-key-name').value || null;
  const nsSelect = document.getElementById('new-key-namespace');
  const namespace_id = nsSelect && nsSelect.value ? nsSelect.value : null;
  const scopes = [];
  if (document.getElementById('scope-read')?.checked) scopes.push('read');
  if (document.getElementById('scope-write')?.checked) scopes.push('write');
  if (document.getElementById('scope-execute')?.checked) scopes.push('execute');
  if (!scopes.length) { alert('Select at least one scope'); return; }
  try {
    const body = { name, scopes };
    if (namespace_id) body.namespace_id = namespace_id;
    const result = await apiFetch('/v1/users/me/api-keys', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    pendingKeyBanner = result.key;
    loadApiKeys();
    loadStats();
  } catch (e) { alert('Failed to create key: ' + e.message); }
}

async function revokeKey(keyId) {
  if (!confirm('Revoke this API key? This cannot be undone.')) return;
  try {
    await apiFetch(`/v1/users/me/api-keys/${keyId}`, { method: 'DELETE' });
    loadApiKeys();
    loadStats();
  } catch (e) { alert('Failed to revoke key: ' + e.message); }
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '\u2014';
  try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return iso; }
}

let _currentFnContext = null;
let _selectedVersion = null;

function computeLineDiff(oldText, newText) {
  const oldLines = (oldText || '').split('\n');
  const newLines = (newText || '').split('\n');
  const maxLen = Math.max(oldLines.length, newLines.length);
  const left = [];
  const right = [];
  let leftNum = 0, rightNum = 0;
  for (let i = 0; i < maxLen; i++) {
    const ol = i < oldLines.length ? oldLines[i] : undefined;
    const nl = i < newLines.length ? newLines[i] : undefined;
    if (ol === nl) {
      leftNum++; rightNum++;
      left.push({ type: 'same', text: ol, lineNum: leftNum });
      right.push({ type: 'same', text: nl, lineNum: rightNum });
    } else {
      if (ol !== undefined) { leftNum++; left.push({ type: 'remove', text: ol, lineNum: leftNum }); }
      else left.push({ type: 'empty', text: '', lineNum: null });
      if (nl !== undefined) { rightNum++; right.push({ type: 'add', text: nl, lineNum: rightNum }); }
      else right.push({ type: 'empty', text: '', lineNum: null });
    }
  }
  return { left, right };
}

function renderDiffLines(lines) {
  return lines.map(l => {
    if (l.type === 'empty') return `<div class="diff-line diff-line-same"><span class="diff-line-num"></span><span class="diff-line-text">&nbsp;</span></div>`;
    const cls = l.type === 'add' ? 'diff-line-add' : l.type === 'remove' ? 'diff-line-remove' : 'diff-line-same';
    const prefix = l.type === 'add' ? '+ ' : l.type === 'remove' ? '- ' : '  ';
    const num = l.lineNum != null ? l.lineNum : '';
    return `<div class="diff-line ${cls}"><span class="diff-line-num">${num}</span><span class="diff-line-text">${prefix}${esc(l.text)}</span></div>`;
  }).join('');
}

async function selectVersion(nsName, svcName, fnName, versionNum) {
  const rows = document.querySelectorAll('.version-clickable');
  rows.forEach(r => r.classList.remove('selected'));
  const row = document.getElementById(`version-row-${versionNum}`);
  if (row) row.classList.add('selected');

  const diffArea = document.getElementById('version-diff-area');
  diffArea.innerHTML = '<div class="loading"><span class="loader"></span>Loading version</div>';

  try {
    const detail = await apiFetch(
      `/v1/namespaces/${encodeURIComponent(nsName)}/services/${encodeURIComponent(svcName)}/functions/${encodeURIComponent(fnName)}/versions/${versionNum}`
    );
    _selectedVersion = detail;
    showVersionDiff();
  } catch (e) {
    diffArea.innerHTML = `<div class="loading" style="color:var(--danger)">${esc(e.message)}</div>`;
  }
}

function showVersionDiff() {
  const diffArea = document.getElementById('version-diff-area');
  if (!_selectedVersion || !_currentFnContext) {
    diffArea.innerHTML = '';
    return;
  }

  const active = _currentFnContext.active_version_details;
  const selected = _selectedVersion;

  if (selected.version === _currentFnContext.active_version) {
    diffArea.innerHTML = `<div style="padding:12px;color:var(--text-3);font-size:13px">This is the active version.</div>`;
    return;
  }

  const sections = [
    { label: 'Code', key: 'code', format: v => v || '' },
    { label: 'Input Schema', key: 'input_schema', format: v => v ? JSON.stringify(v, null, 2) : '' },
    { label: 'Output Schema', key: 'output_schema', format: v => v ? JSON.stringify(v, null, 2) : '' },
    { label: 'Config', key: 'config', format: v => v ? JSON.stringify(v, null, 2) : '' },
    { label: 'Requirements', key: 'requirements', format: v => (v || []).join('\n') },
    { label: 'Env Vars', key: 'required_env', format: v => {
      const req = (v || []).map(e => e + ' (required)');
      return req.join('\n');
    }},
  ];

  let html = `<div class="section-label" style="margin-top:20px">Comparing v${selected.version} &larr;&rarr; v${_currentFnContext.active_version} (active)</div>`;
  let hasDiff = false;

  for (const sec of sections) {
    const oldVal = sec.format(selected[sec.key]);
    const activeVal = active ? sec.format(active[sec.key]) : '';
    if (!oldVal && !activeVal) continue;

    const diff = computeLineDiff(oldVal, activeVal);
    const anyChange = diff.left.some(l => l.type !== 'same') || diff.right.some(l => l.type !== 'same');

    if (!anyChange && !oldVal && !activeVal) continue;

    hasDiff = hasDiff || anyChange;
    html += `<div class="diff-section-title">${sec.label}${anyChange ? '' : ' <span style="color:var(--text-3)">(unchanged)</span>'}</div>`;
    if (anyChange) {
      html += `<div class="diff-container">
        <div><div class="diff-panel-label">v${selected.version}</div><div class="diff-panel">${renderDiffLines(diff.left)}</div></div>
        <div><div class="diff-panel-label">v${_currentFnContext.active_version} (active)</div><div class="diff-panel">${renderDiffLines(diff.right)}</div></div>
      </div>`;
    }
  }

  if (!hasDiff) {
    html += `<div style="padding:8px 0;color:var(--text-3);font-size:13px">No differences between versions.</div>`;
  }

  diffArea.innerHTML = html;
}
</script>
</body>
</html>
