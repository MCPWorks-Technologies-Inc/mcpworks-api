<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mcpworks admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        display: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        body: ['"DM Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
  body { background: #111827; color: #e5e7eb; font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif; }
  .card { background: #1f2937; border: 1px solid #374151; border-radius: 8px; }
  .btn { background: #2563eb; color: white; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif; font-weight: 500; transition: background 0.15s; }
  .btn:hover { background: #1d4ed8; }
  input { background: #030712; border: 1px solid #374151; color: #fff; padding: 8px 12px; border-radius: 6px; font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif; transition: border-color 0.15s; }
  input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 12px; color: #6b7280; font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #374151; }
  td { padding: 8px 12px; border-bottom: 1px solid #1f2937; font-size: 14px; }
  tr:hover td { background: #1f2937; }
  .clickable { cursor: pointer; }
  .clickable:hover { color: #60a5fa; }
  .breadcrumb { color: #6b7280; font-size: 14px; }
  .breadcrumb a { color: #60a5fa; text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .tag { background: #374151; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 4px; display: inline-block; color: #9ca3af; }
  .stat-card { cursor: pointer; transition: all 0.2s; }
  .stat-card:hover { border-color: #2563eb; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .stat-num { font-size: 28px; font-weight: 700; color: #fff; font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif; }
  .stat-label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif; font-weight: 600; }
  pre.code-block { background: #030712; border: 1px solid #374151; border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; font-family: ui-monospace, monospace; }
  .schema-block { background: #030712; border: 1px solid #374151; border-radius: 8px; padding: 12px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; font-family: ui-monospace, monospace; }
  .hidden { display: none; }
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid #374151; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-active { color: #4ade80; }
  .status-suspended { color: #f87171; }
  .status-completed { color: #4ade80; }
  .status-failed { color: #f87171; }
  .status-running { color: #fbbf24; }
  .status-pending { color: #6b7280; }
  .status-pending_approval { color: #fbbf24; }
  .status-rejected { color: #f87171; }
</style>
</head>
<body>

<div id="app" class="max-w-6xl mx-auto px-4 py-6">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-lg font-bold text-white font-display">MCPWorks <span class="text-blue-500">admin</span></h1>
    <div id="user-info" class="text-sm text-gray-400 hidden"></div>
  </div>

  <!-- Login -->
  <div id="login-section" class="card p-8 max-w-sm mx-auto mt-20">
    <h2 class="text-white font-bold mb-4 font-display text-xl">Sign in</h2>
    <div id="login-error" class="text-red-400 text-sm mb-3 hidden"></div>
    <input id="login-email" type="email" placeholder="Email" class="block w-full mb-3">
    <input id="login-password" type="password" placeholder="Password" class="block w-full mb-4">
    <button id="login-btn" class="btn w-full" onclick="doLogin()">Login</button>
  </div>

  <!-- Dashboard (hidden until login) -->
  <div id="dashboard" class="hidden">

    <!-- Stats bar -->
    <div id="stats-bar" class="grid grid-cols-6 gap-4 mb-6">
      <div class="card stat-card p-4 text-center" onclick="loadUsers()"><div class="stat-num" id="stat-users">-</div><div class="stat-label">Users</div></div>
      <div class="card stat-card p-4 text-center" onclick="loadNamespaces()"><div class="stat-num" id="stat-namespaces">-</div><div class="stat-label">Namespaces</div></div>
      <div class="card stat-card p-4 text-center" onclick="loadAllServices()"><div class="stat-num" id="stat-services">-</div><div class="stat-label">Services</div></div>
      <div class="card stat-card p-4 text-center" onclick="loadAllFunctions()"><div class="stat-num" id="stat-functions">-</div><div class="stat-label">Functions</div></div>
      <div class="card stat-card p-4 text-center" onclick="loadExecutions()"><div class="stat-num" id="stat-executions">-</div><div class="stat-label">Executions</div></div>
      <div class="card stat-card p-4 text-center"><div class="stat-num" id="stat-calls">-</div><div class="stat-label">Tool Calls</div></div>
    </div>

    <!-- Pending Approvals -->
    <div id="pending-section" class="card p-4 mb-6 hidden">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-white font-bold font-display text-sm">Pending Approvals</h3>
        <span id="pending-count" class="tag" style="background:#92400e;color:#fbbf24;"></span>
      </div>
      <table id="pending-table"><thead><tr><th>Email</th><th>Name</th><th>Registered</th><th>Actions</th></tr></thead><tbody id="pending-body"></tbody></table>
    </div>

    <!-- Breadcrumb -->
    <div id="breadcrumb" class="breadcrumb mb-4"></div>

    <!-- Content area -->
    <div id="content" class="card"></div>
  </div>

</div>

<script>
let TOKEN = null;
const API = window.location.origin;

// --- Auth ---

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');

  try {
    const res = await fetch(`${API}/v1/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.detail?.message || data.detail || 'Login failed');
    }

    const data = await res.json();
    TOKEN = data.access_token;

    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('user-info').classList.remove('hidden');
    document.getElementById('user-info').textContent = email;

    loadStats();
    loadPendingApprovals();
    loadNamespaces();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

document.getElementById('login-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-email').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

async function apiFetch(path) {
  const res = await fetch(`${API}${path}`, {
    headers: { 'Authorization': `Bearer ${TOKEN}` },
  });
  if (res.status === 401 || res.status === 403) {
    TOKEN = null;
    document.getElementById('login-section').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('login-error').textContent = 'Session expired or access denied';
    document.getElementById('login-error').classList.remove('hidden');
    throw new Error('Unauthorized');
  }
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

// --- Stats ---

async function loadStats() {
  try {
    const stats = await apiFetch('/v1/admin/stats');
    document.getElementById('stat-users').textContent = stats.users;
    document.getElementById('stat-namespaces').textContent = stats.namespaces;
    document.getElementById('stat-services').textContent = stats.services;
    document.getElementById('stat-functions').textContent = stats.functions;
    document.getElementById('stat-executions').textContent = stats.executions;
    document.getElementById('stat-calls').textContent = stats.total_calls ?? '-';
  } catch (e) {
    console.error('Failed to load stats', e);
  }
}

// --- Pending Approvals ---

async function loadPendingApprovals() {
  try {
    const users = await apiFetch('/v1/admin/pending-approvals');
    const section = document.getElementById('pending-section');
    const body = document.getElementById('pending-body');
    const count = document.getElementById('pending-count');
    if (!users.length) { section.classList.add('hidden'); return; }
    section.classList.remove('hidden');
    count.textContent = users.length + ' pending';
    body.innerHTML = users.map(u => `<tr>
      <td>${u.email}</td>
      <td>${u.name || '<span class="text-gray-500">—</span>'}</td>
      <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</td>
      <td>
        <button class="btn" style="padding:4px 12px;font-size:12px;" onclick="approveUser('${u.id}')">Approve</button>
        <button class="btn" style="padding:4px 12px;font-size:12px;background:#991b1b;margin-left:4px;" onclick="rejectUserPrompt('${u.id}','${u.email}')">Reject</button>
      </td>
    </tr>`).join('');
  } catch (e) { console.error('Failed to load pending approvals', e); }
}

async function approveUser(userId) {
  try {
    const res = await fetch(`${API}/v1/admin/users/${userId}/approve`, {
      method: 'POST', headers: { 'Authorization': `Bearer ${TOKEN}` },
    });
    if (!res.ok) { const d = await res.json().catch(()=>({})); alert(d.detail || 'Failed'); return; }
    loadPendingApprovals(); loadStats();
  } catch (e) { alert('Error: ' + e.message); }
}

function rejectUserPrompt(userId, email) {
  const reason = prompt(`Reason for rejecting ${email} (optional):`);
  if (reason === null) return;
  rejectUser(userId, reason);
}

async function rejectUser(userId, reason) {
  try {
    const res = await fetch(`${API}/v1/admin/users/${userId}/reject`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason: reason || null }),
    });
    if (!res.ok) { const d = await res.json().catch(()=>({})); alert(d.detail || 'Failed'); return; }
    loadPendingApprovals(); loadStats();
  } catch (e) { alert('Error: ' + e.message); }
}

// --- Breadcrumb ---

function setBreadcrumb(parts) {
  const el = document.getElementById('breadcrumb');
  el.innerHTML = parts.map((p, i) => {
    if (i < parts.length - 1 && p.onclick) {
      return `<a href="#" onclick="${p.onclick}; return false;">${p.label}</a>`;
    }
    return `<span class="text-gray-300">${p.label}</span>`;
  }).join(' <span class="text-gray-600">/</span> ');
}

// --- Users list ---

async function loadUsers() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="p-6"><span class="loader"></span> Loading users...</div>';
  setBreadcrumb([{ label: 'Users' }]);

  try {
    const users = await apiFetch('/v1/admin/users');
    if (users.length === 0) {
      content.innerHTML = '<div class="p-6 text-gray-400">No users found.</div>';
      return;
    }

    content.innerHTML = `
      <table class="fade-in">
        <thead>
          <tr>
            <th>Email</th>
            <th>Name</th>
            <th>Tier</th>
            <th>Status</th>
            <th>Namespaces</th>
            <th>Subscription</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          ${users.map(u => `
            <tr class="clickable" onclick="loadUser('${esc(u.id)}')">
              <td class="text-blue-400 font-medium">${esc(u.email)}</td>
              <td class="text-gray-400">${esc(u.name || '-')}</td>
              <td><span class="tag">${esc(u.tier)}</span></td>
              <td><span class="status-${u.status}">${esc(u.status)}</span></td>
              <td>${u.namespace_count}</td>
              <td class="text-gray-400">${esc(u.subscription_status || '-')}</td>
              <td class="text-gray-500 text-sm">${fmtDate(u.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (e) {
    content.innerHTML = `<div class="p-6 text-red-400">Error: ${esc(e.message)}</div>`;
  }
}

// --- User detail ---

async function loadUser(userId) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="p-6"><span class="loader"></span> Loading user...</div>';
  setBreadcrumb([
    { label: 'Users', onclick: 'loadUsers()' },
    { label: '...' },
  ]);

  try {
    const u = await apiFetch(`/v1/admin/users/${encodeURIComponent(userId)}`);

    setBreadcrumb([
      { label: 'Users', onclick: 'loadUsers()' },
      { label: u.email },
    ]);

    let actionsHtml = '';
    if (u.status === 'active') {
      actionsHtml = `<button class="btn" style="background:#991b1b;" onclick="suspendUserPrompt('${esc(u.id)}','${esc(u.email)}')">Suspend Account</button>`;
    } else if (u.status === 'suspended') {
      actionsHtml = `<button class="btn" style="background:#166534;" onclick="unsuspendUser('${esc(u.id)}')">Unsuspend Account</button>`;
    } else if (u.status === 'pending_approval') {
      actionsHtml = `
        <button class="btn" style="padding:8px 16px;" onclick="approveUser('${esc(u.id)}')">Approve</button>
        <button class="btn" style="padding:8px 16px;background:#991b1b;margin-left:8px;" onclick="rejectUserPrompt('${esc(u.id)}','${esc(u.email)}')">Reject</button>
      `;
    }

    let namespacesHtml = '<div class="text-gray-500 text-sm">No namespaces.</div>';
    if (u.namespaces && u.namespaces.length > 0) {
      namespacesHtml = `
        <table>
          <thead><tr><th>Namespace</th><th>Services</th><th>Functions</th><th>Calls</th><th>Created</th></tr></thead>
          <tbody>
            ${u.namespaces.map(ns => `
              <tr class="clickable" onclick="loadNamespace('${esc(ns.name)}')">
                <td class="text-blue-400 font-medium">${esc(ns.name)}</td>
                <td>${ns.service_count}</td>
                <td>${ns.function_count}</td>
                <td>${ns.call_count}</td>
                <td class="text-gray-500 text-sm">${fmtDate(ns.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    let apiKeysHtml = '<div class="text-gray-500 text-sm">No API keys.</div>';
    if (u.api_keys && u.api_keys.length > 0) {
      apiKeysHtml = `
        <table>
          <thead><tr><th>Prefix</th><th>Name</th><th>Scopes</th><th>Last Used</th><th>Created</th></tr></thead>
          <tbody>
            ${u.api_keys.map(k => `
              <tr>
                <td class="text-gray-300" style="font-family:ui-monospace,monospace;font-size:13px;">${esc(k.prefix)}</td>
                <td class="text-gray-400">${esc(k.name || '-')}</td>
                <td>${(k.scopes || []).map(s => '<span class="tag">' + esc(s) + '</span>').join('')}</td>
                <td class="text-gray-500 text-sm">${fmtDate(k.last_used_at)}</td>
                <td class="text-gray-500 text-sm">${fmtDate(k.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    content.innerHTML = `
      <div class="p-6 fade-in">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h2 class="text-white text-lg font-semibold">${esc(u.email)}</h2>
            ${u.name ? `<p class="text-gray-400 text-sm mt-1">${esc(u.name)}</p>` : ''}
          </div>
          <div class="flex items-center gap-3">
            <span class="tag">${esc(u.tier)}</span>
            <span class="status-${u.status}" style="font-weight:600;">${esc(u.status)}</span>
          </div>
        </div>

        ${u.status === 'suspended' && u.rejection_reason ? `
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:rgba(239,68,68,0.1);border-left:4px solid #ef4444;border-radius:4px;padding:12px 16px;margin-bottom:16px;">
          <tr><td><p style="margin:0;color:#f87171;font-size:13px;"><strong>Suspension reason:</strong> ${esc(u.rejection_reason)}</p></td></tr>
          </table>
        ` : ''}

        <div class="grid grid-cols-4 gap-4 mb-6">
          <div class="card p-3 text-center"><div class="stat-num text-base">${u.namespace_count}</div><div class="stat-label" style="font-size:10px;">Namespaces</div></div>
          <div class="card p-3 text-center"><div class="stat-num text-base">${u.total_functions}</div><div class="stat-label" style="font-size:10px;">Functions</div></div>
          <div class="card p-3 text-center"><div class="stat-num text-base">${u.total_calls}</div><div class="stat-label" style="font-size:10px;">Calls</div></div>
          <div class="card p-3 text-center"><div class="stat-num text-base">${u.api_key_count}</div><div class="stat-label" style="font-size:10px;">API Keys</div></div>
        </div>

        <div class="text-gray-500 text-sm mb-6">
          <span>Email verified: <span class="text-gray-300">${u.email_verified ? 'Yes' : 'No'}</span></span>
          <span class="ml-4">Subscription: <span class="text-gray-300">${esc(u.subscription_status || 'none')}</span></span>
          <span class="ml-4">Created: <span class="text-gray-300">${fmtDate(u.created_at)}</span></span>
        </div>

        <h3 class="text-gray-300 font-medium mb-2">Namespaces</h3>
        <div class="mb-6">${namespacesHtml}</div>

        <h3 class="text-gray-300 font-medium mb-2">API Keys</h3>
        <div class="mb-6">${apiKeysHtml}</div>

        ${actionsHtml ? `<div class="pt-4 border-t border-gray-700">${actionsHtml}</div>` : ''}
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="p-6 text-red-400">Error: ${esc(e.message)}</div>`;
  }
}

function suspendUserPrompt(userId, email) {
  const reason = prompt(`Reason for suspending ${email} (optional):`);
  if (reason === null) return;
  suspendUser(userId, reason);
}

async function suspendUser(userId, reason) {
  try {
    const res = await fetch(`${API}/v1/admin/users/${userId}/suspend`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason: reason || null }),
    });
    if (!res.ok) { const d = await res.json().catch(()=>({})); alert(d.detail || 'Failed'); return; }
    loadUser(userId); loadStats();
  } catch (e) { alert('Error: ' + e.message); }
}

async function unsuspendUser(userId) {
  if (!confirm('Unsuspend this user account?')) return;
  try {
    const res = await fetch(`${API}/v1/admin/users/${userId}/unsuspend`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${TOKEN}` },
    });
    if (!res.ok) { const d = await res.json().catch(()=>({})); alert(d.detail || 'Failed'); return; }
    loadUser(userId); loadStats();
  } catch (e) { alert('Error: ' + e.message); }
}

// --- Namespaces list ---

async function loadNamespaces() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="p-6"><span class="loader"></span> Loading namespaces...</div>';
  setBreadcrumb([{ label: 'Namespaces' }]);

  try {
    const namespaces = await apiFetch('/v1/admin/namespaces');
    if (namespaces.length === 0) {
      content.innerHTML = '<div class="p-6 text-gray-400">No namespaces found.</div>';
      return;
    }

    content.innerHTML = `
      <table class="fade-in">
        <thead>
          <tr>
            <th>Namespace</th>
            <th>Owner</th>
            <th>Account</th>
            <th>Services</th>
            <th>Calls</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          ${namespaces.map(ns => `
            <tr class="clickable" onclick="loadNamespace('${esc(ns.name)}')">
              <td class="text-blue-400 font-medium">${esc(ns.name)}</td>
              <td class="text-gray-400">${esc(ns.owner_email || '-')}</td>
              <td class="text-gray-400">${esc(ns.account_name || '-')}</td>
              <td>${ns.service_count}</td>
              <td>${ns.call_count ?? 0}</td>
              <td class="text-gray-500 text-sm">${fmtDate(ns.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (e) {
    content.innerHTML = `<div class="p-6 text-red-400">Error: ${esc(e.message)}</div>`;
  }
}

// --- Namespace detail ---

async function loadNamespace(nsName) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="p-6"><span class="loader"></span> Loading...</div>';
  setBreadcrumb([
    { label: 'Namespaces', onclick: 'loadNamespaces()' },
    { label: nsName },
  ]);

  try {
    const ns = await apiFetch(`/v1/admin/namespaces/${encodeURIComponent(nsName)}`);

    let servicesHtml = '<div class="text-gray-400 p-4">No services.</div>';
    if (ns.services && ns.services.length > 0) {
      servicesHtml = `
        <table>
          <thead>
            <tr><th>Service</th><th>Description</th><th>Functions</th><th>Calls</th><th>Created</th></tr>
          </thead>
          <tbody>
            ${ns.services.map(svc => `
              <tr class="clickable" onclick="loadFunctions('${esc(nsName)}', '${esc(svc.name)}')">
                <td class="text-blue-400 font-medium">${esc(svc.name)}</td>
                <td class="text-gray-400">${esc(svc.description || '-')}</td>
                <td>${svc.function_count}</td>
                <td>${svc.call_count ?? 0}</td>
                <td class="text-gray-500 text-sm">${fmtDate(svc.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    content.innerHTML = `
      <div class="p-6 fade-in">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-white text-lg font-semibold">${esc(nsName)}</h2>
          <span class="text-gray-500 text-sm">${esc(ns.owner_email || '')}</span>
        </div>
        ${ns.description ? `<p class="text-gray-400 mb-4">${esc(ns.description)}</p>` : ''}
        <p class="text-gray-500 text-sm mb-4">Total calls: <span class="text-gray-300 font-medium">${ns.call_count ?? 0}</span></p>
        ${ns.network_whitelist && ns.network_whitelist.length ? `<p class="text-gray-500 text-sm mb-4">Whitelist: ${ns.network_whitelist.map(ip => esc(ip)).join(', ')}</p>` : ''}
        <h3 class="text-gray-300 font-medium mb-2">Services</h3>
        ${servicesHtml}
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="p-6 text-red-400">Error: ${esc(e.message)}</div>`;
  }
}

// --- Functions in a service ---

async function loadFunctions(nsName, svcName) {
  const content = document.getElementById('content');

    }

    content.innerHTML = `

  } catch (e) {

// --- Function detail ---

async function loadFunction(nsName, svcName, fnName) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="p-6"><span class="loader"></span> Loading...</div>';
  setBreadcrumb([
    { label: 'Namespaces', onclick: 'loadNamespaces()' },
    { label: nsName, onclick: `loadNamespace('${esc(nsName)}')` },
    { label: svcName, onclick: `loadFunctions('${esc(nsName)}', '${esc(svcName)}')` },
    { label: fnName },
  ]);

  try {
    const fn = await apiFetch(`/v1/admin/namespaces/${encodeURIComponent(nsName)}/services/${encodeURIComponent(svcName)}/functions/${encodeURIComponent(fnName)}`);

    const av = fn.active_version_details;

    content.innerHTML = `
      <div class="p-6 fade-in">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-white text-lg font-semibold">${esc(fn.name)}</h2>
          <span class="text-gray-500 text-sm">v${fn.active_version}</span>
        </div>
        ${fn.description ? `<p class="text-gray-400 mb-3">${esc(fn.description)}</p>` : ''}
        <p class="text-gray-500 text-sm mb-3">Calls: <span class="text-gray-300 font-medium">${fn.call_count ?? 0}</span></p>
        ${(fn.tags || []).length ? `<div class="mb-4">${fn.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}

        ${av ? `
          <div class="mb-4">
            <div class="text-sm text-gray-500 mb-1">Backend: <span class="text-gray-300">${esc(av.backend)}</span></div>
          </div>

          ${av.code ? `
            <h3 class="text-gray-300 font-medium mb-2">Code</h3>
            <pre class="code-block mb-4">${esc(av.code)}</pre>
          ` : ''}

          ${av.config ? `
            <h3 class="text-gray-300 font-medium mb-2">Config</h3>
            <div class="schema-block mb-4">${esc(JSON.stringify(av.config, null, 2))}</div>
          ` : ''}

          ${av.input_schema ? `
            <h3 class="text-gray-300 font-medium mb-2">Input Schema</h3>
            <div class="schema-block mb-4">${esc(JSON.stringify(av.input_schema, null, 2))}</div>
          ` : ''}

          ${av.output_schema ? `
            <h3 class="text-gray-300 font-medium mb-2">Output Schema</h3>
            <div class="schema-block mb-4">${esc(JSON.stringify(av.output_schema, null, 2))}</div>
          ` : ''}
        ` : '<div class="text-gray-500">No active version details.</div>'}

        ${fn.versions && fn.versions.length > 1 ? `
          <h3 class="text-gray-300 font-medium mb-2 mt-6">Version History</h3>
          <table>
            <thead><tr><th>Version</th><th>Backend</th><th>Created</th></tr></thead>
            <tbody>
              ${fn.versions.map(v => `
                <tr>
                  <td>${v.version === fn.active_version ? '<span class="text-green-400">v' + v.version + ' (active)</span>' : 'v' + v.version}</td>
                  <td class="text-gray-400">${esc(v.backend)}</td>
                  <td class="text-gray-500 text-sm">${fmtDate(v.created_at)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        ` : ''}
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="p-6 text-red-400">Error: ${esc(e.message)}</div>`;
  }
}

// --- Helpers ---

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '-';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch {
    return iso;
  }
}
