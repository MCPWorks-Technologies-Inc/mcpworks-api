services:
  caddy:
    image: caddy:2-alpine
    container_name: mcpworks-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - mcpworks-net
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcpworks-api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_PORT=8000
      - JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem
      - SANDBOX_DEV_MODE=false
      - INFISICAL_TOKEN=${INFISICAL_TOKEN:-}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID:-}
      - INFISICAL_API_URL=${INFISICAL_API_URL:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID:-}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET:-}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID:-}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET:-}
      - OAUTH_STATE_SECRET=${OAUTH_STATE_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@mcpworks.io}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - ENCRYPTION_KEK_B64=${ENCRYPTION_KEK_B64:-}
    volumes:
      - sandbox-tmp:/tmp/sandbox
      - scratchpad-data:/opt/mcpworks/scratchpad
      - ./keys/jwt_private.pem:/app/keys/private.pem:ro
      - ./keys/jwt_public.pem:/app/keys/public.pem:ro
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
    networks:
      - mcpworks-net
      - mcpworks-agents
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sandbox-tmp:
  scratchpad-data:
  caddy-data:
  caddy-config:

networks:
  mcpworks-net:
    driver: bridge
  mcpworks-agents:
    driver: bridge
    name: mcpworks-agents
