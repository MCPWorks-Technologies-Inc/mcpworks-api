services:
  caddy:
    image: caddy:2-alpine
    container_name: mcpworks-caddy
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - mcpworks-net
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcpworks-api
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    ports:
      - "${ADMIN_BIND:-127.0.0.1}:9000:8000"
    volumes:
      - sandbox-tmp:/tmp/sandbox
      - scratchpad-data:/opt/mcpworks/scratchpad
      - ./keys/jwt_private.pem:/app/keys/private.pem:ro
      - ./keys/jwt_public.pem:/app/keys/public.pem:ro
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
    networks:
      - mcpworks-net
      - mcpworks-agents
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sandbox-tmp:
  scratchpad-data:
  caddy-data:
  caddy-config:

networks:
  mcpworks-net:
    driver: bridge
  mcpworks-agents:
    driver: bridge
    name: mcpworks-agents
