# DigitalOcean App Platform - Production
#
# Deploy: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <app-id> --spec .do/app.yaml
#
# STAGING HOOK: Copy this file to app.staging.yaml and change:
#   - name: mcpworks-api-staging
#   - branch: staging
#   - instance_size_slug: basic-xs
#   - instance_count: 1
#   - APP_ENV: staging
#   - APP_DEBUG: "true"
#   - domain: api-staging.mcpworks.io
#   - Use test Stripe keys

name: mcpworks-api
region: nyc

services:
  - name: api
    dockerfile_path: Dockerfile
    github:
      repo: MCPWorks-Technologies-Inc/mcpworks-api
      branch: main
      deploy_on_push: true

    # Resources
    # STAGING HOOK: Use basic-xs ($12) and instance_count: 1
    instance_size_slug: professional-xs
    instance_count: 2

    # Networking
    http_port: 8000
    routes:
      - path: /

    # Health checks
    health_check:
      http_path: /v1/health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # Environment variables
    envs:
      # App config
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: PROMETHEUS_ENABLED
        value: "true"

      # Database (injected by App Platform)
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

      # Redis (injected by App Platform)
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.DATABASE_URL}

      # JWT Keys (set via DO Console - sensitive)
      - key: JWT_PRIVATE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JWT_PUBLIC_KEY
        scope: RUN_TIME
        type: SECRET

      # Stripe (set via DO Console - sensitive)
      # STAGING HOOK: Use sk_test_* keys for staging
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_STARTER
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_PRO
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_ENTERPRISE
        scope: RUN_TIME
        type: SECRET

      # Backend services
      - key: MATH_SERVICE_URL
        value: http://localhost:8001
      - key: AGENT_SERVICE_URL
        value: http://localhost:8002
      - key: AGENT_CALLBACK_SECRET
        scope: RUN_TIME
        type: SECRET

      # CORS
      - key: CORS_ORIGINS
        value: '["https://mcpworks.io", "https://www.mcpworks.io", "https://app.mcpworks.io"]'

# Databases
# STAGING HOOK: Use size: basic-xs for staging
databases:
  - name: db
    engine: PG
    version: "15"
    size: professional-xs
    num_nodes: 1

  - name: redis
    engine: REDIS
    version: "7"
    size: professional-xs
    num_nodes: 1

# Custom domain
# STAGING HOOK: Use api-staging.mcpworks.io for staging
domains:
  - domain: api.mcpworks.io
    type: PRIMARY

# Alerts (optional)
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
