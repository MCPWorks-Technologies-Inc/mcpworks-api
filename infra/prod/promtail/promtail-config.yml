server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://MGMT_VPC_IP:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: mcpworks-prod
          __path__: /var/lib/docker/containers/**/*.log
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{container_name="mcpworks-api"}'
          stages:
            - json:
                expressions:
                  level: level
                  event: event
            - labels:
                level:
                event:

  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: mcpworks-prod
          __path__: /var/log/syslog
