global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: "mcpworks-api"
    static_configs:
      - targets: ["PROD_VPC_IP:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "node-exporter"
    static_configs:
      - targets: ["PROD_VPC_IP:9100"]
    scrape_interval: 15s
