# CI Pipeline - Lint, Test, Build, Security Scan
#
# Optimized for wall-clock time: 3 jobs instead of 6.
# Runner provisioning (~5-7 min queue each) is the bottleneck, not execution.
#
# Job graph (2 tiers):
#   lint  ->  test                (postgres + redis service containers)
#         ->  build-and-smoketest (Docker build + sandbox smoke test in one job)
#         ->  security-and-audit  (pip-audit + trufflehog + sandbox CVE scan)

name: CI

on:
  push:
    branches: [main, 001-api-gateway-mvp]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # ORDER-005: Weekly sandbox audit (Monday 9am UTC)
  workflow_call:  # Allow being called from deploy.yml

env:
  PYTHON_VERSION: "3.11"
  POSTGRES_USER: mcpworks
  POSTGRES_PASSWORD: mcpworks_dev
  POSTGRES_DB: mcpworks

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run ruff linter
        run: ruff check src/ tests/ --output-format=github

      - name: Run ruff formatter check
        run: ruff format --check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcpworks -d mcpworks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Generate test JWT keys
        run: |
          openssl ecparam -name prime256v1 -genkey -noout -out /tmp/jwt_private.pem
          openssl ec -in /tmp/jwt_private.pem -pubout -out /tmp/jwt_public.pem
          echo "JWT_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/jwt_private.pem >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "JWT_PUBLIC_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/jwt_public.pem >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          REDIS_URL: redis://localhost:6379/1
          APP_ENV: development
          APP_DEBUG: "true"
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
          ALLOW_REGISTRATION: "true"
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
        run: |
          pytest tests/ -v --cov=mcpworks_api --cov-report=xml --cov-report=term-missing --cov-fail-under=0

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Build Docker image and run sandbox smoke test in one job.
  # These were previously 2 separate jobs (build + sandbox-smoketest), each
  # provisioning its own runner. The smoketest was rebuilding the same image
  # from GHA cache anyway — running it here avoids that round-trip entirely.
  # Also: build has no dependency on test results (it just builds the image),
  # so it runs parallel with test instead of waiting for it.
  build-and-smoketest:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: mcpworks-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run sandbox smoke test
        run: |
          # nsjail writes logs to stderr; capture stdout (JSON) and stderr separately
          docker run --rm --privileged \
            -e JSON_OUTPUT=1 \
            mcpworks-api:${{ github.sha }} \
            /opt/mcpworks/bin/run-smoketest.sh \
            > smoketest-output.json 2>smoketest-stderr.log || true
          # Show nsjail logs for debugging
          echo "=== nsjail stderr ==="
          cat smoketest-stderr.log
          echo "=== smoketest JSON ==="
          cat smoketest-output.json
          # Validate all passed
          jq -e '.failed == 0' smoketest-output.json

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoketest-results
          path: |
            smoketest-output.json
            smoketest-stderr.log

  # Merged security scan + sandbox package audit into one job.
  # Previously 2 separate jobs each needing their own runner provision.
  # Both are pip-based checks that share the same Python setup.
  security-and-audit:
    name: Security Scan & Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" pip-audit

      - name: Run pip-audit for API vulnerabilities
        run: pip-audit --desc on --ignore-vuln CVE-2026-4539  # pygments regex DoS, local-only, no fix available

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

      # ORDER-005: Sandbox package audit (also runs weekly via schedule trigger)
      - name: Install sandbox packages
        run: |
          pip install \
            requests httpx urllib3 aiohttp websockets \
            pyyaml orjson tomli tomli-w xmltodict msgpack \
            pydantic attrs jsonschema \
            beautifulsoup4 lxml markdownify markdown html2text chardet python-slugify jinja2 regex \
            python-dateutil pytz arrow \
            numpy pandas scipy scikit-learn sympy statsmodels \
            matplotlib pillow \
            openai anthropic tiktoken cohere \
            boto3 stripe sendgrid twilio google-cloud-storage \
            tabulate feedparser openpyxl xlsxwriter python-docx pypdf \
            cryptography pyjwt bcrypt \
            psycopg2-binary pymongo redis \
            humanize tqdm rich typing-extensions

      - name: Audit sandbox packages for CVEs
        run: pip-audit --strict --desc on 2>&1 | tee sandbox-audit-report.txt

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-audit-report
          path: sandbox-audit-report.txt
