# CI/CD Pipeline
#
# STAGING HOOK: When ready for staging environment, add 'staging' branch:
#   push:
#     branches: [main, staging]
#   pull_request:
#     branches: [main, staging]

name: CI

on:
  push:
    branches: [main, 001-api-gateway-mvp]
    # STAGING HOOK: Add staging branch here
  pull_request:
    branches: [main]
    # STAGING HOOK: Add staging branch here

env:
  PYTHON_VERSION: "3.11"
  POSTGRES_USER: mcpworks
  POSTGRES_PASSWORD: mcpworks_dev
  POSTGRES_DB: mcpworks

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run ruff linter
        run: ruff check src/ tests/ --output-format=github

      - name: Run ruff formatter check
        run: ruff format --check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcpworks -d mcpworks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Generate test JWT keys
        run: |
          openssl ecparam -name prime256v1 -genkey -noout -out /tmp/jwt_private.pem
          openssl ec -in /tmp/jwt_private.pem -pubout -out /tmp/jwt_public.pem
          echo "JWT_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/jwt_private.pem >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "JWT_PUBLIC_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/jwt_public.pem >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          REDIS_URL: redis://localhost:6379/1
          APP_ENV: development
          APP_DEBUG: "true"
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
        run: |
          pytest tests/ -v --cov=src/mcpworks_api --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mcpworks-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" pip-audit

      - name: Run pip-audit for vulnerabilities
        run: pip-audit --strict --desc on
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

