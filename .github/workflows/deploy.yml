# Automated Deployment to Production
# Runs on a self-hosted runner on server0.pop11.
# Push to main → CI passes (GitHub-hosted) → Deploy runs locally on server0.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for CI workflow on $SHA..."
          for i in $(seq 1 40); do
            RESULT=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0] | .status + ":" + (.conclusion // "pending")' 2>/dev/null || true)
            WF_STATUS="${RESULT%%:*}"
            WF_CONCLUSION="${RESULT##*:}"
            if [ "$WF_STATUS" = "completed" ]; then
              if [ "$WF_CONCLUSION" = "success" ]; then
                echo "CI passed!"
                exit 0
              else
                echo "CI failed with conclusion: $WF_CONCLUSION"
                exit 1
              fi
            fi
            echo "  Attempt $i/40 — CI status: ${WF_STATUS:-unknown}..."
            sleep 15
          done
          echo "Timed out waiting for CI"
          exit 1

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: wait-for-ci
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Sync to build context
        run: |
          sudo rsync -a --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --include='src/***' \
            --include='deploy/***' \
            --include='alembic/***' \
            --include='alembic.ini' \
            --include='scripts/***' \
            --include='docs/' \
            --include='docs/guide.md' \
            --include='docs/llm-reference.md' \
            --include='pyproject.toml' \
            --include='README.md' \
            --include='Dockerfile' \
            --exclude='*' \
            ./ /opt/mcpworks/src/

      - name: Rebuild and restart
        working-directory: /opt/mcpworks
        run: |
          set -euo pipefail

          echo "=== Deploying $(git -C src rev-parse --short HEAD) ==="

          echo "Rebuilding Docker image..."
          sudo docker compose build api

          echo "Restarting API container..."
          sudo docker compose up -d api

          echo "Waiting for health check..."
          for i in $(seq 1 12); do
            sleep 5
            if sudo docker compose ps api 2>/dev/null | grep -q "(healthy)"; then
              echo "API is healthy"
              break
            fi
            echo "  attempt $i/12..."
          done

          if ! sudo docker compose ps api 2>/dev/null | grep -q "(healthy)"; then
            echo "ERROR: API not healthy after 60s"
            sudo docker logs mcpworks-api --tail 30
            exit 1
          fi

          sudo docker image prune -f
          echo "=== Deploy complete ==="

      - name: Verify via public endpoint
        run: |
          sleep 5
          curl -sf https://api.mcpworks.io/v1/health || echo "Health check pending..."
