# Automated Deployment to Production
# Triggers on push to main after CI passes
#
# Previously used `workflow_call` to re-run all CI jobs (~9 min duplicated).
# Now waits for the CI workflow that already triggered on the same push.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

# Only run one deployment at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for CI workflow on $SHA..."
          for i in $(seq 1 40); do
            RESULT=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0] | .status + ":" + (.conclusion // "pending")' 2>/dev/null || true)
            WF_STATUS="${RESULT%%:*}"
            WF_CONCLUSION="${RESULT##*:}"
            if [ "$WF_STATUS" = "completed" ]; then
              if [ "$WF_CONCLUSION" = "success" ]; then
                echo "CI passed!"
                exit 0
              else
                echo "CI failed with conclusion: $WF_CONCLUSION"
                exit 1
              fi
            fi
            echo "  Attempt $i/40 — CI status: ${WF_STATUS:-unknown}..."
            sleep 15
          done
          echo "Timed out waiting for CI"
          exit 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: wait-for-ci
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Add known hosts with retry
          for i in 1 2 3; do
            ssh-keyscan -T 10 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "Retry $i..."
            sleep 5
          done
          # Verify key file
          if [ ! -s ~/.ssh/deploy_key ]; then
            echo "Error: SSH key is empty"
            exit 1
          fi

      - name: Sync code to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Allowlist-only sync: only files needed for Docker build and runtime.
          # Everything else stays off the server. --delete removes stale files.
          #
          # What the server needs:
          #   src/              Application code (COPY in Dockerfile)
          #   deploy/           nsjail scripts, config, rootfs (COPY in Dockerfile)
          #   alembic/          Database migrations (COPY in Dockerfile)
          #   alembic.ini       Migration config (COPY in Dockerfile)
          #   scripts/          start.sh entrypoint (COPY in Dockerfile)
          #   docs/guide.md     User-facing docs served by API (COPY in Dockerfile)
          #   docs/llm-reference.md  LLM reference served by API (COPY in Dockerfile)
          #   pyproject.toml    Python deps (COPY in Dockerfile)
          #   README.md         Required by pyproject.toml metadata
          #   Dockerfile        Docker build
          #   docker-compose.prod.yml  Container orchestration
          #   Caddyfile         Reverse proxy config
          #
          # NOT synced (and removed if present):
          #   CLAUDE.md, SPEC.md, .secrets.baseline  (internal docs / security risk)
          #   tests/, docs/implementation/, infra/    (dev-only)
          #   .github/, .pre-commit-config.yaml       (CI/dev tooling)
          rsync -avz --delete \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --include='src/***' \
            --include='deploy/***' \
            --include='alembic/***' \
            --include='alembic.ini' \
            --include='scripts/***' \
            --include='docs/' \
            --include='docs/guide.md' \
            --include='docs/llm-reference.md' \
            --include='pyproject.toml' \
            --include='README.md' \
            --include='Dockerfile' \
            --include='docker-compose.prod.yml' \
            --include='Caddyfile' \
            --exclude='*' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/mcpworks/

      - name: Rebuild and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} << 'ENDSSH'
            set -euo pipefail

            echo "=== Starting deployment ==="
            cd /opt/mcpworks

            # Rebuild and restart
            echo "Rebuilding Docker image..."
            docker compose -f docker-compose.prod.yml build api

            echo "Restarting API and Caddy containers..."
            docker compose -f docker-compose.prod.yml up -d api
            docker compose -f docker-compose.prod.yml restart caddy

            # Wait for health check
            echo "Waiting for health check..."
            sleep 15

            # Verify
            if docker compose -f docker-compose.prod.yml ps api | grep -q "(healthy)"; then
              echo "Deployment successful! API is healthy."
            else
              echo "WARNING: Health check status:"
              docker compose -f docker-compose.prod.yml ps api
            fi

            # Cleanup
            docker image prune -f

            echo "=== Deployment complete ==="
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://api.mcpworks.io/v1/health || echo "Health check pending..."
