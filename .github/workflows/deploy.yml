# Automated Deployment to Production
# Triggers on push to main after CI passes

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

# Only run one deployment at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # Run CI first
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Add known hosts with retry
          for i in 1 2 3; do
            ssh-keyscan -T 10 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "Retry $i..."
            sleep 5
          done
          # Verify key file
          if [ ! -s ~/.ssh/deploy_key ]; then
            echo "Error: SSH key is empty"
            exit 1
          fi

      - name: Sync code to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Sync source code (excludes sensitive/generated files)
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='.coverage' \
            --exclude='htmlcov' \
            --exclude='.pytest_cache' \
            --exclude='.mypy_cache' \
            --exclude='keys' \
            --exclude='logs' \
            --exclude='data' \
            --exclude='sandbox' \
            --exclude='nsjail' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/mcpworks/

      - name: Rebuild and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} << 'ENDSSH'
            set -euo pipefail

            echo "=== Starting deployment ==="
            cd /opt/mcpworks

            # Rebuild and restart
            echo "Rebuilding Docker image..."
            docker compose -f docker-compose.prod.yml build api

            echo "Restarting API container..."
            docker compose -f docker-compose.prod.yml up -d api

            # Wait for health check
            echo "Waiting for health check..."
            sleep 15

            # Verify
            if docker compose -f docker-compose.prod.yml ps api | grep -q "(healthy)"; then
              echo "Deployment successful! API is healthy."
            else
              echo "WARNING: Health check status:"
              docker compose -f docker-compose.prod.yml ps api
            fi

            # Cleanup
            docker image prune -f

            echo "=== Deployment complete ==="
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://api.mcpworks.io/v1/health || echo "Health check pending..."
