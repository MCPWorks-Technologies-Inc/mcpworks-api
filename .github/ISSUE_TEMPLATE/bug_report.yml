name: Bug Report
description: Report a bug in MCPWorks
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Call endpoint '...'
        2. With payload '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or logs if available.
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Type
      options:
        - MCPWorks Cloud
        - Self-hosted (Docker Compose)
        - Local development
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: MCPWorks version or commit hash.
      placeholder: e.g., v1.0.0 or abc1234

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Docker version, etc.
      placeholder: |
        - OS: Ubuntu 22.04
        - Python: 3.11.8
        - Docker: 24.0.7

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
