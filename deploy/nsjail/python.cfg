name: "python-sandbox"
description: "Secure Python code execution sandbox with curated packages"

mode: ONCE
hostname: "sandbox"
cwd: "/sandbox"

time_limit: 30
max_cpus: 1

rlimit_as_type: VALUE
rlimit_as: 512
rlimit_cpu_type: VALUE
rlimit_cpu: 30
rlimit_fsize_type: VALUE
rlimit_fsize: 10
rlimit_nofile_type: VALUE
rlimit_nofile: 32
rlimit_nproc_type: VALUE
rlimit_nproc: 16

# UID/GID mapping is set per-execution in spawn-sandbox.sh (not here).
# All tiers use UID 65534 (nobody). Network isolation:
#   Free tier: clone_newnet creates empty namespace (zero connectivity).
#   Paid tiers: spawn-sandbox.sh creates a veth-pair namespace and runs
#               nsjail inside it with clone_newnet DISABLED (sed override).

# Namespaces
clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true

# Environment variables
envar: "PYTHONPATH=/opt/mcpworks/site-packages:/sandbox"
envar: "HOME=/tmp"
envar: "LANG=C.UTF-8"
envar: "SSL_CERT_FILE=/usr/lib/ssl/cert.pem"
envar: "OPENBLAS_NUM_THREADS=1"
envar: "OMP_NUM_THREADS=1"

# --- Filesystem mounts ---

# Host system libraries (read-only)
mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
    rw: false
}

# Curated sandbox packages (read-only, shared across executions)
mount {
    src: "/opt/mcpworks/sandbox-root/site-packages"
    dst: "/opt/mcpworks/site-packages"
    is_bind: true
    rw: false
}

# Node.js binary for TypeScript execution (read-only)
mount {
    src: "/opt/mcpworks/sandbox-root/usr/local/bin/node"
    dst: "/usr/local/bin/node"
    is_bind: true
    rw: false
    mandatory: false
}

# Pre-installed npm packages for TypeScript (read-only)
mount {
    src: "/opt/mcpworks/sandbox-root/node_modules"
    dst: "/usr/local/lib/node_modules"
    is_bind: true
    rw: false
    mandatory: false
}

# F-36: execute.pyc is NO LONGER bind-mounted into the sandbox.
# spawn-sandbox.sh copies it to the writable tmpfs workspace, and
# execute.py self-destructs (os.unlink) before user code runs.
# This prevents .pyc decompilation via marshal.loads().

# Rootfs /etc files (read-only)
mount {
    src: "/opt/mcpworks/rootfs/passwd"
    dst: "/etc/passwd"
    is_bind: true
    rw: false
}

mount {
    src: "/opt/mcpworks/rootfs/group"
    dst: "/etc/group"
    is_bind: true
    rw: false
}

mount {
    src: "/opt/mcpworks/rootfs/hosts"
    dst: "/etc/hosts"
    is_bind: true
    rw: false
}

mount {
    src: "/opt/mcpworks/rootfs/resolv.conf"
    dst: "/etc/resolv.conf"
    is_bind: true
    rw: false
}

# SSL certificates for HTTPS from sandbox
mount {
    src: "/etc/ssl/certs"
    dst: "/etc/ssl/certs"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/usr/share/ca-certificates"
    dst: "/usr/share/ca-certificates"
    is_bind: true
    rw: false
    mandatory: false
}

# --- ORDER-004: Static /dev with required device nodes ---
# tmpfs base so nsjail can create mount points for device bind mounts.
# NOTE: No options field — the pinned nsjail commit (d20ea0a58ab5) uses
# the new mount API (fsconfig) which mishandles key=value options as
# boolean flags, causing "Invalid argument".  Size is irrelevant here
# (only 4 device bind-mount points).  rlimit_as caps total memory.
mount {
    dst: "/dev"
    fstype: "tmpfs"
    rw: true
}

# Required device nodes (bind-mounted read-only from host)
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/zero"
    dst: "/dev/zero"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/random"
    dst: "/dev/random"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}

# --- ORDER-004: /proc (process info) ---
# PID namespace (clone_newpid: true) already isolates process visibility.
# Full procfs is mounted because Python needs /proc/self for runtime ops.
# Sensitive entries are overlaid with fakes or empty tmpfs to prevent
# host reconnaissance (see SECURITY_AUDIT.md FINDING-02).
mount {
    dst: "/proc"
    fstype: "proc"
    rw: false
}

# /proc/cpuinfo, /proc/meminfo, /proc/version are overlaid with fake
# files via --bindmount_ro in spawn-sandbox.sh (tier-aware for meminfo).
#
# /proc/net is now isolated by clone_newnet — each sandbox gets its own
# network namespace with an empty /proc/net (no host network info visible).

# Writable tmpfs for /tmp
# Size not specified due to nsjail fsconfig bug (see /dev comment).
# rlimit_as (512 MB) and cgroup memory limits bound total usage.
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
}

# /sandbox is bind-mounted per-execution via spawn-sandbox.sh --bindmount flag
# (writable, private to each execution)

# --- ORDER-001: Seccomp allowlist ---
# Seccomp policy is loaded from /etc/mcpworks/seccomp.policy via the
# --seccomp_policy flag in spawn-sandbox.sh.
#
# The policy uses an ALLOWLIST (DEFAULT DENY + explicit ALLOW) for
# defense-in-depth.  Only ~190 syscalls needed by Python + glibc +
# numpy/scipy/BLAS are permitted.  All others are killed with SIGSYS.
#
# IMPORTANT: nsjail compiles each seccomp_string independently (not
# concatenated), so we MUST use the --seccomp_policy file approach.

# exec_bin is overridden by spawn-sandbox.sh command-line args.
# exec_fd: true makes nsjail use execveat(fd) instead of execve(path),
# allowing us to block execve in seccomp while still launching Python.
# This prevents all shell execution (posix.system, subprocess, /bin/sh)
# at the kernel level regardless of Python-level bypass attempts.
exec_bin {
    path: "/usr/local/bin/python3"
    arg0: "python3"
    arg: "-S"
    arg: "/sandbox/.e"
    exec_fd: true
}
