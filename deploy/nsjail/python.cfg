name: "python-sandbox"
description: "Secure Python code execution sandbox with curated packages"

mode: ONCE
hostname: "sandbox"
cwd: "/sandbox"

time_limit: 30
max_cpus: 1

rlimit_as_type: VALUE
rlimit_as: 512
rlimit_cpu_type: VALUE
rlimit_cpu: 30
rlimit_fsize_type: VALUE
rlimit_fsize: 10
rlimit_nofile_type: VALUE
rlimit_nofile: 32
rlimit_nproc_type: VALUE
rlimit_nproc: 16

# Run as nobody (65534) inside AND outside the sandbox.
# outside_id must be 65534 (not "") so the process actually runs as
# UID 65534 in the global namespace — required for iptables owner-match
# rules to work.
uidmap {
    inside_id: "65534"
    outside_id: "65534"
    count: 1
    use_newidmap: false
}

gidmap {
    inside_id: "65534"
    outside_id: "65534"
    count: 1
    use_newidmap: false
}

# Namespaces
clone_newnet: false
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true

# Environment variables
envar: "PYTHONPATH=/opt/mcpworks/site-packages:/sandbox"
envar: "HOME=/tmp"
envar: "LANG=C.UTF-8"
envar: "SSL_CERT_FILE=/usr/lib/ssl/cert.pem"

# --- Filesystem mounts ---

# Host system libraries (read-only)
mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
    rw: false
}

# Curated sandbox packages (read-only, shared across executions)
mount {
    src: "/opt/mcpworks/sandbox-root/site-packages"
    dst: "/opt/mcpworks/site-packages"
    is_bind: true
    rw: false
}

# Sandbox scripts (execute.py, read-only)
mount {
    src: "/opt/mcpworks/bin"
    dst: "/opt/mcpworks/bin"
    is_bind: true
    rw: false
}

# Rootfs /etc files (read-only)
mount {
    src: "/opt/mcpworks/rootfs/passwd"
    dst: "/etc/passwd"
    is_bind: true
    rw: false
}

mount {
    src: "/opt/mcpworks/rootfs/group"
    dst: "/etc/group"
    is_bind: true
    rw: false
}

mount {
    src: "/opt/mcpworks/rootfs/hosts"
    dst: "/etc/hosts"
    is_bind: true
    rw: false
}

mount {
    src: "/opt/mcpworks/rootfs/resolv.conf"
    dst: "/etc/resolv.conf"
    is_bind: true
    rw: false
}

# SSL certificates for HTTPS from sandbox
mount {
    src: "/etc/ssl/certs"
    dst: "/etc/ssl/certs"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/usr/share/ca-certificates"
    dst: "/usr/share/ca-certificates"
    is_bind: true
    rw: false
    mandatory: false
}

# --- ORDER-004: Static /dev with required device nodes ---
# tmpfs base so nsjail can create mount points for device bind mounts
mount {
    dst: "/dev"
    fstype: "tmpfs"
    rw: true
    options: "size=65536,mode=0755,nr_inodes=16"
}

# Required device nodes (bind-mounted read-only from host)
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/zero"
    dst: "/dev/zero"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/random"
    dst: "/dev/random"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}

# --- ORDER-004: /proc with hidepid=2 (hides other processes) ---
mount {
    dst: "/proc"
    fstype: "proc"
    rw: false
    options: "hidepid=2"
}

# Writable tmpfs for /tmp
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=16777216"
}

# /sandbox is bind-mounted per-execution via spawn-sandbox.sh --bindmount flag
# (writable, private to each execution)

# --- ORDER-001: Seccomp default-deny allowlist ---
# Only explicitly listed syscalls are allowed. Everything else is killed.
# This replaces the previous deny-list approach.

# ── File I/O ──
seccomp_string: "ALLOW {"
seccomp_string: "  read, write, open, openat, close,"
seccomp_string: "  pread64, pwrite64, readv, writev,"
seccomp_string: "  lseek, ftruncate, truncate,"
seccomp_string: "  fstat, stat, lstat, newfstatat, statx, statfs, fstatfs,"
seccomp_string: "  access, faccessat, faccessat2,"
seccomp_string: "  readlink, readlinkat, getcwd,"
seccomp_string: "  dup, dup2, dup3,"
seccomp_string: "  fcntl, ioctl,"
seccomp_string: "  flock, fallocate,"
seccomp_string: "  sendfile, copy_file_range,"
seccomp_string: "  rename, renameat, renameat2,"
seccomp_string: "  unlink, unlinkat, rmdir,"
seccomp_string: "  mkdir, mkdirat,"
seccomp_string: "  symlink, symlinkat, link, linkat,"
seccomp_string: "  chmod, fchmod, fchmodat,"
seccomp_string: "  chown, fchown, fchownat, lchown,"
seccomp_string: "  umask,"
seccomp_string: "  getdents, getdents64,"
seccomp_string: "  utime, utimes, utimensat, futimesat,"

# ── Memory management ──
seccomp_string: "  mmap, munmap, mprotect, mremap, brk,"
seccomp_string: "  madvise, mincore, msync, mlock, munlock,"

# ── Process lifecycle ──
seccomp_string: "  exit, exit_group,"
seccomp_string: "  getpid, getppid, gettid,"
seccomp_string: "  set_tid_address, set_robust_list,"
seccomp_string: "  wait4, waitid,"
seccomp_string: "  execve, execveat,"

# ── Signals ──
seccomp_string: "  rt_sigaction, rt_sigprocmask, rt_sigreturn,"
seccomp_string: "  sigaltstack, kill, tgkill, tkill,"
seccomp_string: "  rt_sigpending, rt_sigsuspend, rt_sigtimedwait,"

# ── Time ──
seccomp_string: "  clock_gettime, clock_getres, clock_nanosleep,"
seccomp_string: "  nanosleep, gettimeofday,"
seccomp_string: "  timer_create, timer_delete, timer_settime, timer_gettime, timer_getoverrun,"
seccomp_string: "  timerfd_create, timerfd_settime, timerfd_gettime,"

# ── Threading ──
# clone restricted: block namespace-creating flags (CLONE_NEW* = 0x7e020000)
seccomp_string: "  clone { (arg0 & 0x7e020000) == 0 },"
seccomp_string: "  clone3,"
seccomp_string: "  futex,"
seccomp_string: "  sched_yield, sched_getaffinity, sched_setaffinity,"
seccomp_string: "  sched_getparam, sched_getscheduler,"

# ── Network (httpx, requests, aiohttp, etc.) ──
seccomp_string: "  socket, connect, bind, listen, accept, accept4,"
seccomp_string: "  sendto, recvfrom, sendmsg, recvmsg, sendmmsg, recvmmsg,"
seccomp_string: "  setsockopt, getsockopt,"
seccomp_string: "  getpeername, getsockname,"
seccomp_string: "  shutdown, socketpair,"

# ── I/O multiplexing ──
seccomp_string: "  poll, ppoll, select, pselect6,"
seccomp_string: "  epoll_create, epoll_create1, epoll_ctl, epoll_wait, epoll_pwait,"

# ── Pipes and FDs ──
seccomp_string: "  pipe, pipe2, eventfd, eventfd2,"

# ── User/Group info ──
seccomp_string: "  getuid, geteuid, getgid, getegid,"
seccomp_string: "  getgroups, getresuid, getresgid,"

# ── System info ──
seccomp_string: "  uname, sysinfo,"

# ── Architecture-specific (Python runtime) ──
seccomp_string: "  arch_prctl, prctl,"

# ── Random ──
seccomp_string: "  getrandom,"

# ── Resource limits (read-only) ──
seccomp_string: "  getrlimit, prlimit64, getrusage,"

# ── Misc (Python/glibc runtime needs) ──
seccomp_string: "  rseq, membarrier,"
seccomp_string: "  close_range,"
seccomp_string: "  inotify_init, inotify_init1, inotify_add_watch, inotify_rm_watch"

seccomp_string: "}"
seccomp_string: "DEFAULT KILL"

# exec_bin is overridden by spawn-sandbox.sh command-line args
exec_bin {
    path: "/usr/local/bin/python3"
    arg0: "python3"
    arg: "-S"
    arg: "/opt/mcpworks/bin/execute.py"
}
