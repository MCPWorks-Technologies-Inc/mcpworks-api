name: "python-sandbox"
description: "Secure Python code execution sandbox with curated packages"

mode: ONCE
hostname: "sandbox"
cwd: "/sandbox"

time_limit: 30
max_cpus: 1

rlimit_as_type: SOFT
rlimit_as: 512
rlimit_cpu_type: SOFT
rlimit_cpu: 30
rlimit_fsize_type: SOFT
rlimit_fsize: 10
rlimit_nofile_type: SOFT
rlimit_nofile: 32
rlimit_nproc_type: SOFT
rlimit_nproc: 16

# Run as nobody (65534) inside the sandbox
uidmap {
    inside_id: "65534"
    outside_id: ""
    count: 1
    use_newidmap: false
}

gidmap {
    inside_id: "65534"
    outside_id: ""
    count: 1
    use_newidmap: false
}

# Namespaces
clone_newnet: false
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true

# Environment variables
envar: "PYTHONPATH=/opt/mcpworks/site-packages:/sandbox"
envar: "HOME=/tmp"
envar: "LANG=C.UTF-8"

# --- Filesystem mounts ---

# Host system libraries (read-only)
mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
    rw: false
}

# Curated sandbox packages (read-only, shared across executions)
mount {
    src: "/opt/mcpworks/sandbox-root/site-packages"
    dst: "/opt/mcpworks/site-packages"
    is_bind: true
    rw: false
}

# Sandbox scripts (execute.py, read-only)
mount {
    src: "/opt/mcpworks/bin"
    dst: "/opt/mcpworks/bin"
    is_bind: true
    rw: false
}

# Rootfs /etc files (read-only)
mount {
    src: "/opt/mcpworks/rootfs/passwd"
    dst: "/etc/passwd"
    is_bind: true
    rw: false
}

mount {
    src: "/opt/mcpworks/rootfs/group"
    dst: "/etc/group"
    is_bind: true
    rw: false
}

mount {
    src: "/opt/mcpworks/rootfs/hosts"
    dst: "/etc/hosts"
    is_bind: true
    rw: false
}

mount {
    src: "/opt/mcpworks/rootfs/resolv.conf"
    dst: "/etc/resolv.conf"
    is_bind: true
    rw: false
}

# SSL certificates for HTTPS from sandbox
mount {
    src: "/etc/ssl/certs"
    dst: "/etc/ssl/certs"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/usr/share/ca-certificates"
    dst: "/usr/share/ca-certificates"
    is_bind: true
    rw: false
    mandatory: false
}

# Device nodes (read-only)
mount {
    src: "/opt/mcpworks/rootfs/dev"
    dst: "/dev"
    is_bind: true
    rw: false
}

# proc filesystem
mount {
    dst: "/proc"
    fstype: "proc"
    rw: false
}

# Writable tmpfs for /tmp
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=16777216"
}

# /sandbox is bind-mounted per-execution via spawn-sandbox.sh --bindmount flag
# (writable, private to each execution)

# Seccomp filter
seccomp_string: "ALLOW {"
seccomp_string: "  read, write, open, close, stat, fstat, lstat, poll, lseek,"
seccomp_string: "  mmap, mprotect, munmap, brk, rt_sigaction, rt_sigprocmask,"
seccomp_string: "  ioctl, access, pipe, select, sched_yield, mremap, msync,"
seccomp_string: "  mincore, madvise, dup, dup2, nanosleep, getpid, getuid,"
seccomp_string: "  getgid, geteuid, getegid, getppid, getpgrp, setsid,"
seccomp_string: "  getgroups, setgroups, getresuid, getresgid, sigaltstack,"
seccomp_string: "  uname, arch_prctl, futex, set_tid_address, clock_gettime,"
seccomp_string: "  exit_group, openat, newfstatat, readlinkat, getrandom,"
seccomp_string: "  pread64, pwrite64, readv, writev, fcntl, flock,"
seccomp_string: "  prlimit64, statx, clone3, rseq, set_robust_list,"
seccomp_string: "  sysinfo, getdents64, clock_getres, socket, connect,"
seccomp_string: "  sendto, recvfrom, getsockname, getpeername, setsockopt,"
seccomp_string: "  getsockopt, epoll_create1, epoll_ctl, epoll_wait"
seccomp_string: "}"
seccomp_string: "DEFAULT KILL"

# exec_bin is overridden by spawn-sandbox.sh command-line args
exec_bin {
    path: "/usr/bin/python3"
    arg0: "python3"
    arg: "-S"
    arg: "/opt/mcpworks/bin/execute.py"
}
